<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Muzicalist - Find Your Perfect Musical Artist</title>
    <meta name="description" content="Book singers, instrumentalists, DJs, and bands worldwide. Search musical artists by category, country, and availability on Muzicalist.">
    <meta name="author" content="Muzicalist" />
    <meta name="keywords" content="muzicalist, book musicians, hire artist, singers, DJs, instrumentalists, bands, live music booking, music platform" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://muzicalist.com/" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600;700&family=Oswald:wght@500;600;700&family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap" rel="stylesheet">
    <link rel="preload" as="image" href="/hero-concert.webp" type="image/webp" fetchpriority="high">

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://muzicalist.com/" />
    <meta property="og:site_name" content="Muzicalist" />
    <meta property="og:title" content="Muzicalist - Find Your Perfect Musical Artist" />
    <meta property="og:description" content="Book singers, instrumentalists, DJs, and bands worldwide. Search musical artists by category, country, and availability on Muzicalist." />
    <meta property="og:image" content="https://muzicalist.com/og-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Muzicalist" />
    <meta name="twitter:title" content="Muzicalist - Find Your Perfect Musical Artist" />
    <meta name="twitter:description" content="Book singers, instrumentalists, DJs, and bands worldwide. Search musical artists by category, country, and availability on Muzicalist." />
    <meta name="twitter:image" content="https://muzicalist.com/og-image.png" />

    <link rel="icon" type="image/png" href="/favicon.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Muzicalist",
        "url": "https://muzicalist.com/",
        "logo": "https://muzicalist.com/favicon.png",
        "email": "contact@muzicalist.com",
        "description": "Professional platform connecting musical artists with clients worldwide."
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Muzicalist",
        "url": "https://muzicalist.com/",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://muzicalist.com/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>


  <body>
    <script>
      // Apply theme before paint to avoid flash
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t === 'light') document.documentElement.classList.add('light');
        } catch (e) {}
      })();
    </script>
    <!--
      Note: the old "hide body until first translation" script was removed.
      Before React mounts, #root is empty (nothing to hide), and after mount
      AutoTranslatePageText already hides + translates pre-paint with a 400ms
      safety cap. The old script only delayed LCP by up to 2.5s for non-English
      visitors without preventing any additional flash.
    -->
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
